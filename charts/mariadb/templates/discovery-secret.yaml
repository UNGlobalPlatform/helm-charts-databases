{{- if .Values.discovery.enabled }}
{{- $fullname := include "common.names.fullname" . }}
apiVersion: v1
kind: Secret
metadata:
  name: "discoverable-{{ $fullname }}"
  annotations:
    onyxia/discovery: "mariadb"
type: Opaque
data:
  {{- /* Everything under data: MUST be real base64. Note the port: "3306"
         raw happens to be valid base64 ALPHABET, so the API server accepts
         it unencoded — but consumers b64-decode data: fields, and
         b64dec("3306") is garbage bytes. toString first: the port is a YAML
         integer and b64enc wants a string. Unset values publish as empty —
         never as literal ".Values.…" path text. */}}
  mariadb-service: {{ (include "common.names.fullname" .) | b64enc | quote }}
  mariadb-password: {{ .Values.mariadb.auth.rootPassword | default "" | toString | b64enc | quote }}
  password: {{ .Values.mariadb.auth.password | default "" | toString | b64enc | quote }}
  mariadb-username: {{ .Values.mariadb.auth.username | default "" | toString | b64enc | quote }}
  mariadb-database: {{ .Values.mariadb.auth.database | default "" | toString | b64enc | quote }}
  mariadb-port: {{ .Values.mariadb.primary.service.ports.mysql | toString | b64enc | quote }}
{{- end -}}
