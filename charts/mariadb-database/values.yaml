# NOTE: intentionally NO `global.suspend` key. Onyxia only shows the pause/suspend
# button when the chart exposes `global.suspend`; for a serverless database there
# is nothing to pause (the shared cluster runs regardless), so the key is omitted
# to hide a misleading button.

# The platform's shared MariaDB cluster this release provisions into.
# Platform constants — not user-facing.
cluster:
  name: production
  namespace: mariadb
  port: 3306

auth:
  username: changeme
  password: changeme
  # Final name on the shared cluster is prefixed with your namespace
  # (user-sean + defaultdb -> user_sean_defaultdb).
  database: defaultdb

connections:
  # small=10, medium=50, large=200 concurrent connections (maxUserConnections)
  tier: small

lifecycle:
  # false: deleting this service DROPS the database and user (cleanupPolicy: Delete).
  # true: the schema and user survive deletion (cleanupPolicy: Skip).
  retainOnDelete: false

userPreferences:
  language: en

discovery:
  enabled: true

# A tiny marker pod so Onyxia can detect the service as "ready" (this chart
# otherwise creates no pods in the user's namespace). Its readiness reflects
# network reachability of the shared cluster. Disable for headless/GitOps use
# (e.g. an app consuming the database via discovery) where the UI signal is
# irrelevant.
readiness:
  enabled: true
  image: busybox:1.36
