{{- if .Values.discovery.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: "discoverable-{{ include "mariadb-database.fullname" . }}"
  annotations:
    onyxia/discovery: "mariadb"
type: Opaque
data:
  # FQDN: the shared cluster lives in another namespace, so a bare service
  # name would not resolve from the tenant namespace.
  mariadb-service: {{ include "mariadb-database.host" . | b64enc | quote }}
  mariadb-username: {{ include "mariadb-database.userName" . | b64enc | quote }}
  mariadb-password: {{ .Values.auth.password | b64enc | quote }}
  password: {{ .Values.auth.password | b64enc | quote }}
  mariadb-database: {{ include "mariadb-database.dbName" . | b64enc | quote }}
  mariadb-port: {{ .Values.cluster.port | toString | b64enc | quote }}
{{- end -}}
